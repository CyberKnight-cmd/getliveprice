name: Fetch Metal Prices

on:
  schedule:
    - cron: '0 * * * *'    # every hour
  workflow_dispatch:        # allows manual trigger from GitHub UI

concurrency:
  group: fetch-prices
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Fetch prices
        run: uv run python fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name "prices-bot"
          git config user.email "prices-bot@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices"
          git push

