name: Fetch Metal Prices

on:
  schedule:
    - cron: '15 4 * * *'   # 09:45 IST
    - cron: '0 10 * * *'   # 15:30 IST
    - cron: '0 15 * * *'   # 20:30 IST
  workflow_dispatch:        # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Fetch prices
        run: uv run python fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name "prices-bot"
          git config user.email "prices-bot@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet || git commit -m "chore: update prices"
          git push
